name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/151226054031/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deploy@my-local-gov-poc.iam.gserviceaccount.com'

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project my-local-gov-poc --non-interactive
